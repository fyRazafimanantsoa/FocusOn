<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded elegant base -->
  <rect width="32" height="32" rx="8" fill="#0f172a" />
  <!-- Focus concentric tracker ring -->
  <circle cx="16" cy="16" r="10" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="3 2" stroke-linecap="round" opacity="0.85" />
  <!-- Radiant core dot representing target achievement -->
  <circle cx="16" cy="16" r="4" fill="#10b981" />
  <circle cx="16" cy="16" r="4" fill="#10b981" opacity="0.4">
    <animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
